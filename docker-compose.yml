# ═══════════════════════════════════════════════════════════════════════════════
# ShopEase — Full Stack Docker Compose
#
# Services:
#   postgres    → primary database         http://localhost:5432
#   redis       → cache layer              http://localhost:6379
#   app         → Spring Boot API          http://localhost:8080
#   prometheus  → metrics collector        http://localhost:9090
#   grafana     → metrics dashboard        http://localhost:3001  (admin/admin)
#
# USAGE:
#   # Start everything (first time — builds the app image):
#   docker compose up --build
#
#   # Start only infra (DB + Redis), run app in IDE:
#   docker compose up postgres redis
#
#   # Start infra + observability (no app rebuild needed):
#   docker compose up postgres redis prometheus grafana
#
#   # Stop and remove containers (keeps volumes):
#   docker compose down
#
#   # Stop AND wipe all data (fresh start):
#   docker compose down -v
#
#   # View logs of one service:
#   docker compose logs -f app
#   docker compose logs -f prometheus
#
# SECRETS:
#   Copy .env.example → .env and fill real values.
#   docker compose reads .env automatically.
#   Never commit .env to git.
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/ecommerce_dev
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-ecommerce-super-secret-key-change-in-production-must-be-at-least-256-bits}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Pulls metrics from Spring Boot /actuator/prometheus every 15s
  # and stores them as time-series data
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      # our scrape config telling Prometheus where to find the app
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # persist collected metrics across restarts
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'   # keep 7 days of metrics
      - '--web.enable-lifecycle'              # allows hot config reload via POST /-/reload
    networks:
      - ecommerce-network
    depends_on:
      - app
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Reads from Prometheus and renders dashboards
  # Login: admin / admin  (change on first login)
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    ports:
      - "3001:3000"          # 3000 conflicts with React dev server, map to 3001
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      # Auto-provision datasource + dashboard so you don't click through UI
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - ecommerce-network
    depends_on:
      - prometheus
    restart: unless-stopped

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  uploads-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  ecommerce-network:
    driver: bridge
