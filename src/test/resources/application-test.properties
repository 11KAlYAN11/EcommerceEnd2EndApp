# ── Phase 13: Test Profile ────────────────────────────────────────────────────
# H2 in-memory DB replaces PostgreSQL for tests.
# Tests are isolated: schema is created fresh per test run (create-drop).
# No Docker, no PostgreSQL installation needed to run tests.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Redis — CacheConfig catches the connection failure and falls back
# to ConcurrentMapCacheManager automatically (see CacheConfig.java)
spring.data.redis.host=redis-test-invalid
spring.data.redis.port=6380

# Disable real SMTP — tests must never send real emails
# All email methods are @Async + try-catch, so failures are silently logged
spring.mail.host=smtp.test.invalid
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# JWT — short expiration is fine for tests
jwt.secret=test-secret-key-for-unit-testing-min-256-bits-pad0000000000
jwt.expiration=3600000

# File upload dir for tests
file.upload.dir=test-uploads

# Keep logs quiet during tests — only show warnings and above
logging.level.com.ecommerce=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
