spring.application.name=ecommerce-backend
spring.profiles.active=dev

server.port=${PORT:8080}
server.servlet.context-path=/api
server.forward-headers-strategy=framework

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ecommerce-super-secret-key-change-in-production-must-be-long}
jwt.expiration=86400000

# ── CORS ──────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:*}

# ── Actuator ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Ecommerce Backend API
info.app.version=1.0.0

# ── Swagger ───────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ── Logging ───────────────────────────────────────────────────
logging.level.com.ecommerce=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.zaxxer.hikari=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
