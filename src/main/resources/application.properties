spring.application.name=ecommerce-backend
spring.profiles.active=dev

server.port=${PORT:8080}
server.servlet.context-path=/api
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_dev}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET:ecommerce-super-secret-key-change-in-production-must-be-long}
jwt.expiration=86400000

# CORS — explicitly list all allowed frontend origins
# Dev: Vite (5173). Prod: set ALLOWED_ORIGINS env var to your real domain.
# WHY not just "*"? When allowCredentials=true (needed for Authorization header),
# browsers reject "*" — you must name specific origins.
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*}


# prometheus: exposes /actuator/prometheus — Prometheus scrapes this
# loggers: exposes /actuator/loggers — change log levels at runtime without restart
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
# Graceful shutdown (Phase 15): finish in-flight requests before stopping
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

info.app.name=Ecommerce Backend API
info.app.version=1.0.0
info.app.phase=monolith-phases-0-15

# api-docs.path is relative to context-path — so /v3/api-docs becomes /api/v3/api-docs on the wire
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
# url must be the full absolute path the browser fetches — context-path (/api) + api-docs.path
springdoc.swagger-ui.url=/v3/api-docs
springdoc.swagger-ui.custom-css-url=/swagger-dark.css
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.operations-sorter=method

# Gmail SMTP — use an App Password (not your real Gmail password)
# To create App Password: Google Account → Security → 2-Step Verification → App passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:programmer143143@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-gmail-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
mail.from.address=${MAIL_USERNAME:programmer143143@gmail.com}
mail.from.name=EcommerceApp

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
# Cache TTL: products cached for 10 min, categories for 30 min
cache.ttl.products=600
cache.ttl.categories=1800

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=${UPLOAD_DIR:uploads}

logging.level.com.ecommerce=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.deprecation=ERROR
logging.level.com.zaxxer.hikari=WARN
# Phase 14: %X{correlationId} prints the MDC value set by CorrelationIdFilter
# Every log line now shows which HTTP request it belongs to
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{correlationId:---}] %-5level %logger{36} - %msg%n
