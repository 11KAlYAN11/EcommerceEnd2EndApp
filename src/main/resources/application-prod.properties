# ═══════════════════════════════════════════════════════════════════════════════
# Phase 15 — Production Profile (spring.profiles.active=prod)
#
# HOW SPRING PROFILES WORK:
#   application.properties         → always loaded (base config)
#   application-dev.properties     → loaded ONLY when profile=dev
#   application-prod.properties    → loaded ONLY when profile=prod
#   Profile properties OVERRIDE base properties with the same key.
#
# To activate: set environment variable: SPRING_PROFILES_ACTIVE=prod
#   (never hardcode "prod" in application.properties itself)
#
# WHY SEPARATE PROD CONFIG?
#   Dev: verbose SQL logs, show errors, auto-create DB schema
#   Prod: silent, never modify schema, hide error details from users
#   Prod: all secrets from environment variables, never hardcoded
# ═══════════════════════════════════════════════════════════════════════════════

# ── Database ──────────────────────────────────────────────────────────────────
# validate: Hibernate checks schema matches entities on startup, then stops.
# NEVER use create/create-drop in prod — drops all tables, destroys data.
# NEVER use update in prod — schema migration should be done by Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=validate

# All values MUST come from environment variables in prod
# If not set, the app fails to start (no defaults that would allow insecure startup)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Larger pool for production traffic
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ── Security ──────────────────────────────────────────────────────────────────
# In prod: JWT secret MUST be a long random string from environment
jwt.secret=${JWT_SECRET}
# Access tokens expire in 1 hour (3600000ms) — shorter than dev for security
jwt.expiration=3600000

# No wildcard CORS in prod — restrict to your actual frontend domain
cors.allowed-origins=${ALLOWED_ORIGINS}

# ── JPA ───────────────────────────────────────────────────────────────────────
# Never show SQL in prod logs — leaks schema info, floods logs
spring.jpa.show-sql=false
# Don't let Hibernate use deprecated APIs in prod
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true

# ── Cache / Redis ─────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Email ─────────────────────────────────────────────────────────────────────
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
mail.from.address=${MAIL_USERNAME}

# ── File Upload ───────────────────────────────────────────────────────────────
# In prod: use S3 bucket path, not local disk
file.upload.dir=${UPLOAD_DIR:/app/uploads}

# ── Actuator ─────────────────────────────────────────────────────────────────
# In prod: only expose health + prometheus (Prometheus needs it)
# loggers endpoint allows runtime log level changes — too powerful without auth
management.endpoints.web.exposure.include=health,prometheus,info
# NEVER show DB, diskspace, etc. details to unauthenticated callers
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
# Prod: INFO level only (DEBUG is too verbose, fills disks)
# In a 100 req/s app, DEBUG produces ~50MB of logs per minute
logging.level.com.ecommerce=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.root=WARN

# JSON format for structured logging — easier to parse in ELK/Splunk/Loki
# logging.pattern.console= — disable console pattern, use JSON appender in logback-prod.xml
