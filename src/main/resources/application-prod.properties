spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

cors.allowed-origins=${ALLOWED_ORIGINS}

spring.jpa.show-sql=false

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.mail.username=${MAIL_USERNAME:noreply@shopease.com}
spring.mail.password=${MAIL_PASSWORD:disabled}
mail.from.address=${MAIL_USERNAME:noreply@shopease.com}

file.upload.dir=${UPLOAD_DIR:/app/uploads}

# Rate limiting — RATELIMIT_ENABLED=false to bypass (load testing only, never leave off in prod)
ratelimit.enabled=${RATELIMIT_ENABLED:true}
ratelimit.max-requests=${RATELIMIT_MAX_REQUESTS:100}
ratelimit.window-ms=${RATELIMIT_WINDOW_MS:60000}

# Seed admin — real credentials come from env on the server
seed.admin.email=${SEED_ADMIN_EMAIL:admin@test.com}
seed.admin.password=${SEED_ADMIN_PASSWORD:Admin@123}
seed.admin.firstName=${SEED_ADMIN_FIRSTNAME:Admin}
seed.admin.lastName=${SEED_ADMIN_LASTNAME:ShopEase}

management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=never

logging.level.com.ecommerce=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.root=WARN
