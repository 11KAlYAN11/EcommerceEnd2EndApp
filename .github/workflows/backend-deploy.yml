name: Backend — Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

      - name: Build JAR
        run: mvn package -B -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopease-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/shopease-app:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/shopease-app:latest
            docker stop shopease || true
            docker rm shopease || true
            docker run -d \
              --name shopease \
              -p 8080:8080 \
              --restart unless-stopped \
              --env-file /home/ec2-user/shopease.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/shopease-app:latest
            echo "Deployed at $(date)"
